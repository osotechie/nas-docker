services:

  Plex:
    container_name: Plex
    hostname: plex
    image: plexinc/pms-docker
    restart: always
    networks:
       IoT:
        ipv4_address: 10.1.11.100
    volumes:
      - ${DOCKERDIR}/plex:/config
      - /dev/shm/plex:/transcode 
      - ${NAS_MEDIADIR}/CHILDREN MOVIES:/media/kidsmovies
      - ${NAS_MEDIADIR}/MOVIES:/media/movies
      - ${NAS_MEDIADIR}/TV:/media/tv
      - ${NAS_MEDIADIR}/MUSIC:/media/music
    devices:
    - /dev/dri:/dev/dri
    environment:
    - TZ=${TZ}
    - HOSTNAME=O's
    - ALLOWED_NETWORKS=10.1.1.0/24,10.1.10.0/24,10.1.11.0/24
    labels:
    # Traefik - Service
    - traefik.enable=false
    # AutoKuma - Uptime Kuma Monitor
    - kuma.plex.http.name=Plex
    - kuma.plex.http.url=http://10.1.11.100:32400/identity
    - kuma.plex.http.parent_name=media


  seerr:
    container_name: Seerr
    hostname: seerr
    image: ghcr.io/seerr-team/seerr:latest
    restart: always
    networks:
       media:
    volumes:
      - ${DOCKERDIR}/seerr:/app/config
    environment:
      - TZ=${TZ}
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.seerr.loadbalancer.server.port=5055
    # Traefik - Router - HTTPS
    - "traefik.http.routers.seerr.rule=Host(`seerr.${DOMAIN}`) || Host(`overseerr.${DOMAIN}`) || Host(`ombi.${DOMAIN}`)"    
    #- "traefik.http.routers.seerr.rule=Host(`seerr.${DOMAIN}`) || Host(`overseerr.${DOMAIN}`) || Host(`ombi.${DOMAIN}`)"
    - traefik.http.routers.seerr.entryPoints=websecure
    - traefik.http.routers.seerr.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.seerr.http.name=seerr
    - kuma.seerr.http.url=https://seerr.${DOMAIN}
    - kuma.seerr.http.headers=${KUMA_CFHEADERS}
    - kuma.seerr.http.parent_name=media

  Sonarr:
    container_name: Sonarr
    hostname: sonarr
    image: linuxserver/sonarr:latest
    restart: always
    networks:
       media:
    volumes:
      - ${DOCKERDIR}/sonarr:/config
      - /mnt/storage/downloads:/downloads
      - ${NAS_MEDIADIR}/TV:/tv
    environment:
      - TZ=${TZ}
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.sonarr.loadbalancer.server.port=8989
    # Traefik - Router - HTTPS
    - traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)
    - traefik.http.routers.sonarr.entryPoints=websecure
    - traefik.http.routers.sonarr.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.sonarr.http.name=Sonarr
    - kuma.sonarr.http.url=https://sonarr.${DOMAIN}
    - kuma.sonarr.http.headers=${KUMA_CFHEADERS}
    - kuma.sonarr.http.parent_name=media

