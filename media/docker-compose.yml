  music-assistant-server:
    container_name: MusicAssistant
    hostname: musicassistant
    image: ghcr.io/music-assistant/server:latest
    restart: always
    networks:
       IoT:
        ipv4_address: 10.1.11.101
    volumes:
      - ${DOCKERDIR}/musicassistant/data:/data/
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.musicassistant.loadbalancer.server.port=8095
    # Traefik - Router - HTTPS
    - traefik.http.routers.musicassistant.rule=Host(`musicassistant.${DOMAIN}`)
    - traefik.http.routers.musicassistant.entryPoints=websecure
    - traefik.http.routers.musicassistant.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.musicassistant.http.name=Music Assistant
    - kuma.musicassistant.http.url=https://musicassistant.${DOMAIN}
    - kuma.musicassistant.http.headers=${KUMA_CFHEADERS}
    - kuma.musicassistant.http.parent_name=media

  FileBrowser:
    container_name: FileBrowser
    hostname: FileBrowser
    image: filebrowser/filebrowser
    user: 1001:1001
    restart: always
    networks:
      media:
    volumes:
      - ${DOCKERDIR}/FileBrowser/Config:/config
      - ${DOCKERDIR}/FileBrowser/Database:/database
      - ${DOCKERDIR}/FileBrowser/Data:/data
      # Contents to share
      - ${NAS_MEDIADIR}/CHILDREN MOVIES:/data/media/kidsmovies:ro
      - ${NAS_MEDIADIR}/MOVIES:/data/media/movies:ro
      - ${NAS_MEDIADIR}/TV:/data/media/tv:ro
    environment:
    - TZ=${TZ}
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.filebrowser.loadbalancer.server.port=80
    # Traefik - Router - HTTPS
    - traefik.http.routers.filebrowser.rule=Host(`media.${DOMAIN}`)
    - traefik.http.routers.filebrowser.entryPoints=websecure
    - traefik.http.routers.filebrowser.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.filebrowser.http.name=FileBrowser
    - kuma.filebrowser.http.url=https://media.${DOMAIN}
    - kuma.filebrowser.http.headers=${KUMA_CFHEADERS}
    - kuma.filebrowser.http.parent_name=media


#Shared Networks between containers
networks:
  #Internal Docker Networks
  media:
    name: media
  #External VLANs
  IoT:
    name: O.and.A (IoT)
    driver: macvlan
    driver_opts:
      parent: eno1.10
    ipam:
      config:
        - subnet: 10.1.10.0/23
          gateway: 10.1.10.254
