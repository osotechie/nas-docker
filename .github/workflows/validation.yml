# This is a basic workflow to help you get started with Actions

name: VALIDATION

# Controls when the workflow will run
on:
  push:
    branches-ignore:
      - main
  
  # manually
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  validate:
    runs-on: ubuntu-latest
    
    steps:
   
      # STEP - Check-out Repo
      # ====================
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check-out Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # STEP - Validate docker stacks
      # =============================
      # Run Pester tests to validate all docker-compose.yml files,
      # output JUnit XML for CI tooling, and generate a Job Summary
      # table showing pass/fail per stack.
      - name: Validate Docker Stacks
        id: pester
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = '.github/workflows/tests'
          $config.Run.Exit = $false
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'

          $result = Invoke-Pester -Configuration $config

          # Generate Job Summary
          $summary = @()
          $summary += '## 🐳 Docker Stacks Validation'
          $summary += ''
          if ($result.FailedCount -eq 0) {
            $summary += '### ✅ Result: **ALL STACKS VALID**'
          } else {
            $summary += "### ❌ Result: **$($result.FailedCount) STACK(S) FAILED**"
          }
          $summary += ''
          $summary += "| Stack | Result | Duration |"
          $summary += "|-------|--------|----------|"

          # Pester 5 nests tests under Containers → Blocks → Tests
          $tests = $result.Containers.Blocks.Tests

          foreach ($test in $tests) {
            $name = $test.ExpandedName -replace 'Stack (.+) is valid', '$1'
            $icon = if ($test.Result -eq 'Passed') { '✅' } else { '❌' }
            $duration = '{0:N1}s' -f $test.Duration.TotalSeconds
            $summary += "| ``$name`` | $icon $($test.Result) | $duration |"
          }

          $summary += ''
          $summary += "---"
          $summary += "**Total:** $($result.PassedCount) passed, $($result.FailedCount) failed, $($result.SkippedCount) skipped — ⏱️ $('{0:N1}s' -f $result.Duration.TotalSeconds)"

          $summary -join "`n" >> $env:GITHUB_STEP_SUMMARY

          # Fail the step if any tests failed
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) stack(s) failed validation"
            exit 1
          }

      # STEP - Microsoft Security DevOps
      # ================================
      # Run a security check on everything for potential security issues
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@08976cb623803b1b36d7112d4ff9f59eae704de0 # v1.12.0
        id: msdo
        with:
          tools: checkov, trivy

      # STEP - Upload Microsoft Security DevOps Results
      # ===============================================
      # Upload the results of the Microsoft Security DevOps to the repo
      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}