# This is a basic workflow to help you get started with Actions

name: DEPLOY

# Controls when the workflow will run
on:
  push:
    branches:
      - main
    paths-ignore:
        - '**/*.md'

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  deploy:
    runs-on: ubuntu-latest
    environment: nas

    steps:

      # STEP - Check-out Rep
      # ====================
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check-out Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # STEP - Connect to Azure
      # =======================
      # This step is used to connect to Azure to allow reading of Azure KeyVault in later step
      - name: Connect to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_SPN_CREDENTIALS }}

      # STEP - Get Azure KeyVault Secrets
      # =================================
      # List all secrets in Azure KeyVault, retrieve each value, mask it,
      # and export as an environment variable for the Replace Tokens step.
      # Secret names are uppercased with hyphens replaced by underscores
      # (e.g. 'my-secret' becomes 'MY_SECRET').
      - name: Get Azure KeyVault Secrets
        run: |
          SECRET_NAMES=$(az keyvault secret list --vault-name ${{ secrets.AZURE_KEYVAULT_NAME }} --query "[].name" -o tsv)
          for SECRET_NAME in $SECRET_NAMES; do
            SECRET_VALUE=$(az keyvault secret show --name "$SECRET_NAME" --vault-name ${{ secrets.AZURE_KEYVAULT_NAME }} --query value -o tsv)
            echo "::add-mask::$SECRET_VALUE"
            ENV_NAME=$(echo "$SECRET_NAME" | tr '[:lower:]-' '[:upper:]_')
            echo "$ENV_NAME=$SECRET_VALUE" >> $GITHUB_ENV
          done
          
      # STEP - Replace tokens in .env files
      # ===================================
      # Replaces #{TOKEN}# patterns in files with the matching
      # environment variable. Uses Python for safe handling of special
      # characters in secret values (no sed/regex escaping issues).
      - name: Replace tokens in .env files
        env:
          TOKEN_FILES: '**/.env'
        run: |
          python3 << 'EOF'
          import os, glob, re, sys

          pattern = os.environ.get('TOKEN_FILES', '**/.env')
          count = 0
          errors = 0

          for path in glob.glob(pattern, recursive=True):
              try:
                  with open(path, 'r') as f:
                      content = f.read()

                  replaced = re.sub(
                      r'#\{([^}]+)\}#',
                      lambda m: os.environ.get(m.group(1), m.group(0)),
                      content
                  )

                  if replaced != content:
                      with open(path, 'w') as f:
                          f.write(replaced)
                      count += 1
                      print(f'\u2714 {path}')
              except Exception:
                  errors += 1
                  print(f'\u2716 {path} — failed to process')

          print(f'Done — {count} file(s) updated, {errors} error(s)')
          if errors > 0:
              sys.exit(1)
          EOF

      # STEP - Connect to Wireguard
      # ===========================
      # Install and connect to Wireguard
      - name: Connect to Wireguard
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends resolvconf wireguard
          echo "${{ secrets.WG_CONFIG_FILE }}" > wg0.conf
          sudo chmod 600 wg0.conf
          sudo wg-quick up ./wg0.conf

       # STEP - Add Route to NAS
      # ========================
      # Add route to NAS over Wireguard connection 
      - name: Add Routes
        run: |
          sudo ip route add ${{ vars.HOST_IP }} dev wg0 || true
          ip route show
          ping ${{ vars.HOST_IP }} -c 5

       # STEP - Add SSH Keys
      # ====================
      # Add SSH Key used to connect to NAS, and pin the NAS's host keys
      # so we refuse to talk to anything else (replaces the previous
      # trust-on-first-use ssh-keyscan step, which would silently accept
      # whatever host key the network handed us each run).
      # NOTE: If the NAS is ever rebuilt and its /etc/ssh/ssh_host_* keys
      # regenerated, update the NAS_HOST_KEY secret (environment 'nas')
      # with the new fingerprints or this step will refuse to connect.
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.HOST_FINGERPRINT }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # STEP - Configure ssh  for Docker
      # ================================
      # Add the following ssh configs as per docker suggestion https://docs.docker.com/engine/security/protect-access/#ssh-tips          
      - name: Configure SSH
        run: |
          {
            echo "Host *"
            echo "  ServerAliveInterval 30"
            echo "  ServerAliveCountMax 10"
            echo "  TCPKeepAlive yes"
            echo "  ConnectTimeout 30"
            echo "  ControlMaster auto"
            echo "  ControlPath ~/.ssh/control-%C"
            echo "  ControlPersist 10m"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # STEP - Connect to NAS Docker
      # ============================
      # Connect to NAS Docker Daemon 
      - name: Connect to NAS (Docker Daemon)
        run: |
          docker context create NAS --docker "host=ssh://${{ vars.HOST_USER }}@${{ vars.HOST_IP }}"
          docker context use NAS
          docker info

      # STEP - Deploy Stacks
      # ====================
      # Deploy docker stacks to the NAS via the remote Docker context.
      #
      # COMPOSE_PARALLEL_LIMIT=3 caps how many container operations Compose
      # runs simultaneously per stack. The remote Docker daemon is reached
      # over SSH, and the NAS's sshd has the default MaxSessions=10. With
      # the previous unlimited parallelism, the media stack (13 services)
      # blew past that cap and failed with:
      #   "Session open refused by peer"
      # 3 keeps simultaneous SSH channels comfortably below 10 even
      # accounting for the 2-3 channels each Compose action opens
      # (container query + image manifest + start). Bump cautiously if
      # stacks grow much larger, or raise NAS sshd MaxSessions instead.
      - name: Deploy Docker Stacks
        id: deploy
        env:
          COMPOSE_PARALLEL_LIMIT: 3
        run: |
          set -eo pipefail
          mkdir -p deploy-logs
          failed=()
          succeeded=()
          for dir in */; do
            [ -f "${dir}docker-compose.yml" ] || continue
            stack="${dir%/}"
            echo "::group::Deploying ${stack}"
            if ( cd "$dir" && docker compose up -d ) > "deploy-logs/${stack}.log" 2>&1; then
              cat "deploy-logs/${stack}.log"
              echo "::endgroup::"
              succeeded+=("$stack")
            else
              cat "deploy-logs/${stack}.log"
              echo "::endgroup::"
              echo "::error title=Stack deploy failed::${stack} failed to deploy"
              failed+=("$stack")
            fi
          done

          # Write outcome counts for the report step
          echo "succeeded=${#succeeded[@]}" >> $GITHUB_OUTPUT
          echo "failed=${#failed[@]}" >> $GITHUB_OUTPUT
          echo "succeeded_list=${succeeded[*]}" >> $GITHUB_OUTPUT
          echo "failed_list=${failed[*]}" >> $GITHUB_OUTPUT

          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::${#failed[@]} stack(s) failed: ${failed[*]}"
            exit 1
          fi
          echo "All stacks deployed successfully"
        continue-on-error: true

      # STEP - Generate deployment report
      # ==================================
      # Parse deploy output into a readable GitHub Actions Job Summary
      - name: Generate deployment report
        if: always()
        run: |
          echo "## 🚀 Container Stack Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "### ✅ Result: **ALL STACKS DEPLOYED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Result: **DEPLOYMENT FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Stack | Status | Services |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          for dir in */; do
            [ -f "${dir}docker-compose.yml" ] || continue
            stack="${dir%/}"
            logfile="deploy-logs/${stack}.log"

            # Count services defined in the compose file
            svc_count=$(grep -c '^ \{2,4\}[a-zA-Z].*:$' "${dir}docker-compose.yml" 2>/dev/null | head -1 || echo "?")

            if [ -f "$logfile" ] && ! grep -qi 'error\|failed\|exit code' "$logfile"; then
              echo "| \`${stack}\` | ✅ Deployed | ${svc_count} service(s) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`${stack}\` | ❌ Failed | ${svc_count} service(s) |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # Collapsible per-stack logs
          echo "<details><summary>📋 Deployment Logs</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for logfile in deploy-logs/*.log; do
            [ -f "$logfile" ] || continue
            stack=$(basename "$logfile" .log)
            echo "#### ${stack}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$logfile" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # STEP - Post-deploy container status
      # ====================================
      # Show running container health on the NAS for visibility
      - name: Post-deploy container status
        if: always() && steps.deploy.outcome != 'skipped'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Container Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Highlight unhealthy containers
          UNHEALTHY=$(docker ps --filter "health=unhealthy" --format "{{.Names}}" 2>/dev/null || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **Unhealthy containers:**" >> $GITHUB_STEP_SUMMARY
            echo "$UNHEALTHY" | while read -r name; do
              echo "> - \`$name\`" >> $GITHUB_STEP_SUMMARY
            done
          fi

      # STEP - Fail on deployment error
      # ================================
      # Ensure the workflow fails if any stacks had errors
      - name: Fail on deployment error
        if: steps.deploy.outcome != 'success'
        run: |
          echo "::error::One or more stacks failed to deploy. See the job summary for details."
          exit 1

      #STEP - Copy Content locally
      #===========================
      #Mirror repo content into /config/stacks on the NAS so the local
      #backup/dockhand tooling can read the same files the workflow just
      #deployed. Uses rsync --delete so retired stack directories (e.g.
      #'ai/') are removed on the NAS, not orphaned forever. Excludes
      #repo-meta dirs (.git, .github, .vscode) and the wireguard config
      #we used for this run (belt-and-braces; we already rm'd it).
      #
      #Why -rlvz + --no-perms/owner/group/times instead of -a:
      #The /config/stacks/* directories on the NAS are owned by root.
      #We connect as owen (rwx via POSIX ACL but not the inode owner).
      #Only the inode owner (or root) can update directory metadata
      #(chmod, chown, chgrp, utimes), so every flag in -a that touches
      #directory metadata fails with 'Operation not permitted' — both
      #-t (PR #83 dropped this) and -p (still failing). Rather than
      #removing flags one error at a time, just drop ALL metadata
      #preservation. We only care about file content here; the NAS
      #already has correct dir perms from earlier setup, and new files
      #get sensible defaults (umask 022 -> 644). No executable scripts
      #in this repo so dropping perms is safe.
      - name: Copy Content Locally
        run: |
          #cleanup working files
          rm ./wg0.conf
          rsync -rlvz --delete \
            --no-perms --no-owner --no-group --no-times \
            --exclude='.git' --exclude='.github' --exclude='.vscode' \
            --exclude='wg0.conf' --exclude='deploy-logs' \
            ./ ${{ vars.HOST_USER }}@${{ vars.HOST_IP }}:/config/stacks/

      # STEP - Discconect from Wireguard
      # ================================
      # Discconect from Wireguard
      - name: Disconnect from Wireguard
        if: always()
        run: |
          sudo ip link delete wg0
