services:

  Hermes:
    container_name: Hermes
    hostname: hermes
    image: nousresearch/hermes-agent:latest
    command: gateway run
    restart: always
    networks:
      ai:
    volumes:
      - ${DOCKERDIR}/hermes:/opt/data
    environment:
      - TZ=${TZ}
      # Dashboard
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # Dashboard auth (basic) - defence in depth behind CF Access
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASH_USER}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASH_PASS}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASH_SECRET}
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.hermes.loadbalancer.server.port=9119
    # Traefik - Router - HTTPS
    - traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN}`)
    - traefik.http.routers.hermes.entryPoints=websecure
    - traefik.http.routers.hermes.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.hermes.http.name=Hermes
    - kuma.hermes.http.url=https://hermes.${DOMAIN}
    - kuma.hermes.http.headers=${KUMA_CFHEADERS}
    - kuma.hermes.http.parent_name=ai

#Shared Networks between containers
networks:
  #Internal Docker Networks
  ai:
    name: ai
