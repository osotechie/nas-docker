services: 

  it-tools:
    container_name: it-tools
    hostname: it-tools
    image: corentinth/it-tools
    restart: always
    networks:
       misc:
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.it-tools.loadbalancer.server.port=80
    # Traefik - Router - HTTPS
    - traefik.http.routers.it-tools.rule=Host(`tools.${DOMAIN}`)
    - traefik.http.routers.it-tools.entryPoints=websecure
    #- traefik.http.routers.glances.tls.certresolver=cloudflare
    - traefik.http.routers.it-tools.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.ittools.http.name=IT Tools
    - kuma.ittools.http.url=https://tools.${DOMAIN}
    - kuma.ittools.http.headers=${KUMA_CFHEADERS}
    - kuma.ittools.http.parent_name=misc


  Bento-PDF:
    container_name: bento-pdf
    hostname: bento-pdf
    image: bentopdf/bentopdf-simple:latest
    restart: always
    networks:
       misc:
    #volumes:
      #- ${DOCKERDIR}/Stirling-PDF/trainingData:/usr/share/tessdata # Required for extra OCR languages
      #- ${DOCKERDIR}/Stirling-PDF/extraConfigs:/configs
      #- ${DOCKERDIR}/Stirling-PDF/customFiles:/customFiles/
      #- ${DOCKERDIR}/Stirling-PDF/logs:/logs/
      #- ${DOCKERDIR}/Stirling-PDF/pipeline:/pipeline/
    #environment:
    #  - DOCKER_ENABLE_SECURITY=false
      #- LANGS=en_GB
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.bento-pdf.loadbalancer.server.port=8080
    # Traefik - Router - HTTPS
    - traefik.http.routers.bento-pdf.rule=Host(`pdf.${DOMAIN}`)
    - traefik.http.routers.bento-pdf.entryPoints=websecure
    - traefik.http.routers.bento-pdf.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.bentopdf.http.name=Bento PDF
    - kuma.bentopdf.http.url=https://pdf.${DOMAIN}
    - kuma.bentopdf.http.headers=${KUMA_CFHEADERS}
    - kuma.bentopdf.http.parent_name=misc


  ConvertX: 
    container_name: convertx
    hostname: convertx
    image: ghcr.io/c4illin/convertx
    restart: always
    networks:
       misc:
    volumes:
      - ${DOCKERDIR}/ConvertX/:/app/data
    labels:
    # Traefik - Service
    - traefik.enable=true
    - traefik.http.services.convertx.loadbalancer.server.port=3000
    # Traefik - Router - HTTPS
    - traefik.http.routers.convertx.rule=Host(`convert.${DOMAIN}`)
    - traefik.http.routers.convertx.entryPoints=websecure
    - traefik.http.routers.convertx.middlewares=Real-IP@file, Headers@file
    # AutoKuma - Uptime Kuma Monitor
    - kuma.convertx.http.name=ConvertX
    - kuma.convertx.http.url=https://convert.${DOMAIN}
    - kuma.convertx.http.headers=${KUMA_CFHEADERS}
    - kuma.convertx.http.parent_name=misc

    
#Shared Networks between containers
networks:
  #Internal Docker Networks
  misc:
    name: misc
